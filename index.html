<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>antisalpit</title>
    <link rel="stylesheet" href="dist/bootstrap-5.3.8/css/bootstrap.min.css"/>
    <script src="dist/vue-3.5.30/vue.global.js"></script>
</head>
<body>
    <!-- Inputs Component -->
    <template id="Inputs">
        <div class="container pt-3">
            <div class="d-flex justify-content-center align-items-center" style="column-gap: 10px;">
                <div class="form-floating" style="min-width: 120px;">
                    <input
                        type="number"
                        class="form-control form-control-lg fw-bold"
                        :class="{ 'text-danger': !isEmptyInput1 && !isValidInput1 }"
                        id="input-1"
                        v-model.number="input1"
                        :min="min"
                        :max="max"
                        placeholder="Numero #1"
                        @keyup.enter="go"
                        @blur="() => { if (!isEmptyInput1 && input1 < min) { input1 = min } else if (!isEmptyInput1 && input1 > max) { input1 = max } }"
                    >
                    <label for="input-1" :class="{ 'text-danger': !isEmptyInput1 && !isValidInput1 }">Numero #1</label>
                </div>
                <div class="form-floating" style="min-width: 120px;">
                    <input
                        type="number"
                        class="form-control form-control-lg fw-bold"
                        :class="{ 'text-danger': !isEmptyInput2 && !isValidInput2 }"
                        id="input-2"
                        v-model.number="input2"
                        :min="min"
                        :max="max"
                        placeholder="Numero #2"
                        @keyup.enter="go"
                        @blur="() => { if (!isEmptyInput2 && input2 < min) { input2 = min } else if (!isEmptyInput2 && input2 > max) { input2 = max } }"
                    >
                    <label for="input-2" :class="{ 'text-danger': !isEmptyInput2 && !isValidInput2 }">Numero #2</label>
                </div>
                <button
                    class="btn btn-lg fw-bold"
                    :class="{
                        'btn-outline-success': !isValidInput1 || !isValidInput2,
                        'btn-success'        : isValidInput1  && isValidInput2,
                    }"
                    style="height: 54px;"
                    @click="go"
                    :disabled="isEmptyInput1 || isEmptyInput2"
                >
                    Go
                </button>
                <button
                    class="btn btn-lg fw-bold btn-outline-secondary d-none d-sm-inline-block"
                    @click="$emit('print')"
                    style="height: 54px;"
                    :disabled="isEmptyInput1 || isEmptyInput2"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-printer" viewBox="0 0 16 16">
                        <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1"/>
                        <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1"/>
                    </svg>
                </button>
            </div>
        </div>
    </template>

    <!-- Printer Component -->
    <template id="Printer">
        <div id="print-pairs" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 15px;">{{ input1 }} x {{ input2 }}</h2>
            <hr/>
            <div class="row">
                <div
                    :class="`col-${colClass} col-sm-${colClass} col-md-${colClass} col-lg-${colClass} col-xl-${colClass}`"
                    v-for="(col, colIndex) in pairCols"
                >
                    <div v-for="(pairData, pairDataIndex) in col">
                        <small style="opacity: 0.8; font-family: monospace;">{{(pairData.num).toString().padStart(max.toString().length, '&nbsp;')}}. </small>
                        <span style="font-size: 20px;">
                            <b>{{ pairData.pair.n1.toString().padStart(max.toString().length, '0') }}</b> x <b>{{ pairData.pair.n2.toString().padStart(max.toString().length, '0') }}</b>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Main Component -->
    <template id="AntiSalpit">
        <div class="sticky-top bg-dark pb-3">
            <inputs @submit-inputs="processInputs" @print="handlePrint"></inputs>
        </div>
        <div class="container">
            <div class="row" style="justify-content: center;">
                <div
                    class="col-6 col-sm-4 col-md-3 col-lg-2 col-xl-2 p-2"
                    v-for="(pair, pairKey, pairIndex) in activePairs"
                    :key="pairKey"
                >
                    <button
                        class="btn w-100 h-100 btn-lg d-flex justify-content-between"
                        :id="`pair-${pair.n1}-${pair.n2}`"
                        :class="{
                            'btn-outline-success bg-dark text-success': pair.on,
                            'btn-outline-secondary bg-dark text-secondary border-dark': !pair.on
                        }"
                        :style="{
                            opacity: pair.on ? '1' : '0.7',
                        }"
                        @click="togglePair(pair)"
                    >
                        <small style="opacity: 0.6;">{{pairIndex + 1}}. </small>
                        <span>
                            <b>{{ pair.n1.toString().padStart(max.toString().length, '0') }}</b> x <b>{{ pair.n2.toString().padStart(max.toString().length, '0') }}</b>
                        </span>
                    </button>
                </div>
            </div>
        </div>
        <printer
            :pairs="activePairs"
            :min="min"
            :max="max"
            :input1="input1"
            :input2="input2" ref="printer"
        >
        </printer>
    </template>

    <!-- App -->
    <div id="app">
        <AntiSalpit></AntiSalpit>
    </div>

    <!-- Scripts -->
    <script src="src/js/components/Inputs.vue.js"></script>
    <script src="src/js/components/Printer.vue.js"></script>
    <script src="src/js/AntiSalpit.vue.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
